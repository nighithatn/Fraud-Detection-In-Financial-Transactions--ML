<!DOCTYPE html>
<html>
<head>
<title>FraudShield AI Login</title>
<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}
.card {
    background:#ffffff15;
    padding:40px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    width:350px;
    text-align:center;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}
button {
    width:100%;
    padding:10px;
    background:#00c853;
    border:none;
    color:white;
    border-radius:8px;
    font-weight:bold;
}
h2 { color:white; }
</style>
</head>
<body>
<div class="card">
<h2>🔐 FraudShield AI</h2>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
</div>
</body>
</html>
